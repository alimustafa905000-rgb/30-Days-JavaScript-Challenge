<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bmi-container">
    <h1>BMI Calculator</h1>

    <div class="input-box">
        <input type="number" id="height" placeholder="Enter height (cm)">
        <input type="number" id="weight" placeholder="Enter weight (kg)">
    </div>

    <button id="calculateBtn">Calculate BMI</button>

    <div class="result-box">
        <h2>Your BMI: <span id="bmiResult">0</span></h2>
        <p id="status">Enter your details</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
